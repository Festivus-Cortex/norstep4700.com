name: Release Build

env:
  # The runner checks out to path /opt/actions-runner/_work/norstep4700.com/norstep4700.com by default
  basepath: /opt/actions-runner/_work/norstep4700.com/norstep4700.com
  releasePath: /opt/actions-runner/release/norstep4700.com

permissions:
  contents: write

on:
  # Only run when a pull request is merged into the main branch
  pull_request:
    types: [closed]
    branches: [main]

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # Build the latest main branch, version it, and create a release
  build-and-release:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'main'
    runs-on: self-hosted

    steps:
      - name: Configure git
        run: |
          git config --global user.name "Norstep-CI"
          git config --global user.email "admin@norstep4700.com"
        shell: bash

      - name: Checkout main branch
        uses: actions/checkout@v4
        with:
          ref: main
          lfs: "true"
          ssh-key: ${{ secrets.CI_SSH_KEY }}

      - name: Install dependencies
        run: |
          yarn --version
          yarn install --immutable

      - name: Increment Package Version
        run: |
          cd ${{env.basepath}}
          yarn version --immediate patch
          git add package.json
          if git diff --cached --quiet; then
            echo "No version change detected; skipping commit/push."
          else
            git commit -m "chore: bump version [skip ci]"
            git push origin main
            git pull origin main
          fi

      - name: Build Project
        run: yarn build

      - name: Prepare and Compress Release
        run: |
          mkdir -p ${{env.releasePath}}
          mkdir -p ${{env.releasePath}}/.next/static
          mkdir -p ${{env.releasePath}}/public
          cp -r ${{env.basepath}}/.next/standalone/. ${{env.releasePath}}/
          cp -r ${{env.basepath}}/public/. ${{env.releasePath}}/public/
          cp -r ${{env.basepath}}/.next/static/. ${{env.releasePath}}/.next/static/
          cd ${{env.releasePath}}
          zip -r ${{env.releasePath}}/norstep4700-portfolio.zip .
        shell: bash

      - name: Get Package Version
        id: get_version
        run: |
          version=$(node -p "require(process.env.basepath + '/package.json').version")
          echo "version=$version" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: Release v${{ steps.get_version.outputs.version }}
          draft: false
          prerelease: false
          files: ${{env.releasePath}}/norstep4700-portfolio.zip

      - name: Clean Release Artifacts
        run: |
          rm -rf ${{env.releasePath}}
        shell: bash
